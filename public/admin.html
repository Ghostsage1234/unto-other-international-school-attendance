<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Unto Others International School</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;font-size:15px;}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4a0080,#1a237e);}
.login-box{background:white;border-radius:16px;padding:36px;width:90%;max-width:400px;box-shadow:0 10px 40px rgba(0,0,0,0.25);text-align:center;}
.login-logo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #f5c800;margin-bottom:14px;}
.login-box h2{color:#4a0080;margin-bottom:4px;}
.login-box p{color:#888;font-size:0.85em;margin-bottom:20px;}
/* FORMS */
.fg{margin-bottom:14px;text-align:left;}
.fg label{display:block;color:#444;font-size:0.82em;font-weight:600;margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:0.92em;outline:none;font-family:inherit;background:white;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#4a0080;}
.fg textarea{resize:vertical;min-height:80px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
/* BUTTONS */
.btn{padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:0.88em;font-weight:600;transition:opacity 0.15s;}
.btn:hover{opacity:0.88;}
.btn-primary{background:linear-gradient(135deg,#4a0080,#6a1b9a);color:white;width:100%;}
.btn-sm{padding:5px 11px;font-size:0.78em;border:none;border-radius:6px;cursor:pointer;font-weight:600;}
.btn-blue{background:#0288d1;color:white;}
.btn-red{background:#e53935;color:white;}
.btn-green{background:#2e7d32;color:white;}
.btn-purple{background:#6a1b9a;color:white;}
.btn-orange{background:#f57c00;color:white;}
.btn-gold{background:#f9a825;color:#333;}
.btn-teal{background:#00796b;color:white;}
.btn-grey{background:#757575;color:white;}
/* APP LAYOUT */
#app{display:none;}
.topbar{background:linear-gradient(135deg,#4a0080,#6a1b9a);color:white;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-left img{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid #f5c800;}
.topbar-title{font-size:0.88em;font-weight:700;line-height:1.2;}
.topbar-sub{font-size:0.68em;opacity:0.8;}
.term-badge{background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:20px;font-size:0.76em;}
.topbar-btn{background:rgba(255,255,255,0.18);color:white;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.82em;}
.nav{display:flex;gap:3px;padding:8px 12px;background:white;border-bottom:2px solid #eee;overflow-x:auto;white-space:nowrap;}
.nav button{padding:6px 11px;border:none;background:none;cursor:pointer;border-radius:7px;font-size:0.76em;color:#666;flex-shrink:0;}
.nav button.active{background:#4a0080;color:white;}
.content{padding:14px;max-width:1100px;margin:0 auto;}
/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px;}
.card{background:white;border-radius:12px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
.card .num{font-size:1.9em;font-weight:700;color:#4a0080;}
.card .lbl{font-size:0.72em;color:#777;margin-top:3px;}
.card.green .num{color:#2e7d32;} .card.red .num{color:#c62828;} .card.orange .num{color:#e65100;} .card.blue .num{color:#0277bd;}
/* TABLE */
table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
th{background:#4a0080;color:white;padding:9px 11px;text-align:left;font-size:0.8em;}
td{padding:8px 11px;border-bottom:1px solid #f0f0f0;font-size:0.82em;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#faf5ff;}
/* SECTIONS */
.section{background:white;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.07);}
.section h3{color:#4a0080;margin-bottom:12px;font-size:0.95em;display:flex;align-items:center;gap:6px;}
.section-border{border:2px solid #4a0080;}
/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.72em;font-weight:600;}
.badge-present,.badge-paid{background:#e8f5e9;color:#2e7d32;}
.badge-absent,.badge-unpaid{background:#ffebee;color:#c62828;}
.badge-late,.badge-partial{background:#fff3e0;color:#e65100;}
.badge-blue{background:#e3f2fd;color:#0277bd;}
/* ALERTS */
.alert{padding:9px 13px;border-radius:8px;margin-bottom:10px;font-size:0.83em;}
.alert-success{background:#e8f5e9;color:#2e7d32;border-left:4px solid #43a047;}
.alert-error{background:#ffebee;color:#c62828;border-left:4px solid #e53935;}
.alert-warn{background:#fff3e0;color:#e65100;border-left:4px solid #fb8c00;}
/* SEARCH */
.search-bar{width:100%;padding:9px 13px;border:1.5px solid #ddd;border-radius:8px;font-size:0.88em;outline:none;margin-bottom:12px;}
.search-bar:focus{border-color:#4a0080;}
/* MODALS */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;align-items:center;justify-content:center;padding:16px;}
.modal.show{display:flex;}
.modal-box{background:white;border-radius:16px;padding:22px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
.modal-box h3{color:#4a0080;margin-bottom:14px;font-size:0.95em;}
.modal-cancel{width:100%;padding:9px;margin-top:8px;border:1.5px solid #ddd;border-radius:8px;cursor:pointer;background:none;font-size:0.88em;}
/* PRINT */
@media print{
  .no-print{display:none!important;}
  body{background:white;}
  .section,.card,table{box-shadow:none!important;}
}
/* MISC */
.divider{border:none;border-top:2px dashed #e0e0e0;margin:18px 0;}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.72em;background:#ede7f6;color:#4a0080;margin-left:4px;}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.action-btns{display:flex;gap:4px;flex-wrap:wrap;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <img src="/images/logo.jpeg" class="login-logo" onerror="this.style.display='none'" alt="Logo">
    <h2>🔐 Admin Login</h2>
    <p>Unto Others International School</p>
    <div id="loginAlert"></div>
    <div class="fg"><label>Username</label><input type="text" id="loginUser" placeholder="Enter username"></div>
    <div class="fg"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-primary" onclick="doLogin()">Login</button>
    <a href="/" style="display:block;text-align:center;margin-top:14px;color:#4a0080;font-size:0.85em;text-decoration:none;">← Back to Home</a>
  </div>
</div>

<!-- MODALS -->
<div class="modal" id="resetPwModal">
  <div class="modal-box">
    <h3>🔑 Reset Password — <span id="resetName"></span></h3>
    <div class="fg"><label>New Password</label><input type="password" id="resetPw1" placeholder="Min 6 characters"></div>
    <div class="fg"><label>Confirm</label><input type="password" id="resetPw2" placeholder="Confirm password"></div>
    <div id="resetAlert"></div>
    <button class="btn btn-primary" onclick="doResetPw()" style="margin-bottom:8px">Reset Password</button>
    <button class="modal-cancel" onclick="closeModal('resetPwModal')">Cancel</button>
  </div>
</div>

<div class="modal" id="editStudentModal">
  <div class="modal-box">
    <h3>✏️ Edit Student</h3>
    <div class="fg"><label>Full Name</label><input id="es_name"></div>
    <div class="fg"><label>Class</label><select id="es_class"></select></div>
    <div class="row2">
      <div class="fg"><label>Gender</label><select id="es_gender"><option value="">-</option><option>Male</option><option>Female</option></select></div>
      <div class="fg"><label>Date of Birth</label><input type="date" id="es_dob"></div>
    </div>
    <div class="fg"><label>Parent Name</label><input id="es_parent"></div>
    <div class="fg"><label>Parent Phone</label><input id="es_pphone"></div>
    <div class="fg"><label>Address</label><input id="es_address"></div>
    <div id="esAlert"></div>
    <button class="btn btn-primary" onclick="saveEditStudent()" style="margin-bottom:8px">Save Changes</button>
    <button class="modal-cancel" onclick="closeModal('editStudentModal')">Cancel</button>
  </div>
</div>

<div class="modal" id="paymentModal">
  <div class="modal-box">
    <h3>💰 Record Payment</h3>
    <div class="fg"><label>Student</label><input id="pm_student" readonly style="background:#f5f5f5"></div>
    <div class="fg"><label>Fee Item</label><select id="pm_fee"></select></div>
    <div class="fg"><label>Amount Paid</label><input type="number" id="pm_amount" placeholder="0.00"></div>
    <div class="fg"><label>Payment Date</label><input type="date" id="pm_date"></div>
    <div class="row2">
      <div class="fg"><label>Method</label><select id="pm_method"><option value="cash">Cash</option><option value="bank">Bank Transfer</option><option value="pos">POS</option><option value="cheque">Cheque</option></select></div>
      <div class="fg"><label>Receipt No.</label><input id="pm_receipt" placeholder="Optional"></div>
    </div>
    <div class="fg"><label>Note</label><input id="pm_note" placeholder="Optional"></div>
    <div id="pmAlert"></div>
    <button class="btn btn-primary" onclick="savePay()" style="margin-bottom:8px">Record Payment</button>
    <button class="modal-cancel" onclick="closeModal('paymentModal')">Cancel</button>
  </div>
</div>

<div class="modal" id="receiptModal">
  <div class="modal-box" id="receiptContent"></div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar no-print">
    <div class="topbar-left">
      <img src="/images/logo.jpeg" onerror="this.style.display='none'" alt="">
      <div><div class="topbar-title">Unto Others International School</div><div class="topbar-sub">Admin Portal</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="term-badge" id="termBadge">📅 ...</span>
      <button class="topbar-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="nav no-print">
    <button class="active" onclick="tab('dashboard',this)">📊 Dashboard</button>
    <button onclick="tab('students',this)">🎓 Students</button>
    <button onclick="tab('teachers',this)">👨‍🏫 Teachers</button>
    <button onclick="tab('attendance',this)">📋 Attendance</button>
    <button onclick="tab('fees',this)">💰 Fees</button>
    <button onclick="tab('grades',this)">📝 Grades</button>
    <button onclick="tab('timetable',this)">🕐 Timetable</button>
    <button onclick="tab('reports',this)">📁 Reports</button>
    <button onclick="tab('notices',this)">📢 Notices</button>
    <button onclick="tab('terms',this)">📅 Terms</button>
    <button onclick="tab('settings',this)">⚙️ Settings</button>
  </div>
  <div class="content">
    <div id="tab-dashboard"></div>
    <div id="tab-students" style="display:none"></div>
    <div id="tab-teachers" style="display:none"></div>
    <div id="tab-attendance" style="display:none"></div>
    <div id="tab-fees" style="display:none"></div>
    <div id="tab-grades" style="display:none"></div>
    <div id="tab-timetable" style="display:none"></div>
    <div id="tab-reports" style="display:none"></div>
    <div id="tab-notices" style="display:none"></div>
    <div id="tab-terms" style="display:none"></div>
    <div id="tab-settings" style="display:none"></div>
  </div>
</div>
<script>
let token = localStorage.getItem('admin_token');
let _classes = [], _terms = [], _currency = 'GH₵';

if(token){
  // Verify token is still valid before showing app
  fetch('/api/admin/classes',{headers:{'Authorization':'Bearer '+token}})
    .then(r=>{
      if(r.ok){
        document.getElementById('loginWrap').style.display='none';
        document.getElementById('app').style.display='block';
        init();
      } else {
        localStorage.removeItem('admin_token');
        token=null;
      }
    }).catch(()=>{
      localStorage.removeItem('admin_token');
      token=null;
    });
}

async function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  if(!u||!p){alert('Enter username and password');return;}
  try{
    const r=await fetch('/api/auth/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.token){
      localStorage.setItem('admin_token',d.token);
      token=d.token;
      document.getElementById('loginWrap').style.display='none';
      document.getElementById('app').style.display='block';
      init();
    } else {
      alert(d.error||'Login failed');
    }
  } catch(e){ alert('Network error: '+e.message); }
}

function doLogout(){
  fetch('/api/auth/logout',{method:'POST',headers:{Authorization:'Bearer '+token}});
  localStorage.clear();location.reload();
}

function api(url,opts={}){
  return fetch(url,{...opts,headers:{...opts.headers,'Authorization':'Bearer '+token,'Content-Type':'application/json'}});
}

function showAlert(id,type,msg){
  const el=document.getElementById(id);
  if(!el)return;
  el.innerHTML=`<div class="alert alert-${type==='error'?'error':type==='warn'?'warn':'success'}">${msg}</div>`;
  if(type==='success')setTimeout(()=>{el.innerHTML='';},3000);
}

function closeModal(id){document.getElementById(id).classList.remove('show');}

async function init(){
  const [cr,tr,sr]=await Promise.all([
    api('/api/admin/classes').then(r=>r.json()),
    api('/api/admin/terms').then(r=>r.json()),
    api('/api/admin/settings').then(r=>r.json())
  ]);
  _classes=cr||[];
  _terms=tr||[];
  _currency=sr?.currency_symbol||'GH₵';
  const ct=await api('/api/admin/current-term').then(r=>r.json());
  document.getElementById('termBadge').textContent='📅 '+(ct?.name||'No Term');
  loadDashboard();
}

function tab(name,btn){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('[id^="tab-"]').forEach(t=>t.style.display='none');
  document.getElementById('tab-'+name).style.display='block';
  ({dashboard:loadDashboard,students:loadStudents,teachers:loadTeachers,attendance:loadAttendance,fees:loadFees,grades:loadGrades,timetable:loadTimetable,reports:loadReports,notices:loadNotices,terms:loadTerms,settings:loadSettings})[name]?.();
}

// ── DASHBOARD ─────────────────────────────────────────────
async function loadDashboard(){
  const d=await api('/api/admin/dashboard').then(r=>r.json());
  document.getElementById('tab-dashboard').innerHTML=`
    <div class="cards">
      <div class="card"><div class="num">${d.totalStudents}</div><div class="lbl">Students</div></div>
      <div class="card blue"><div class="num">${d.totalTeachers}</div><div class="lbl">Teachers</div></div>
      <div class="card green"><div class="num">${d.present}</div><div class="lbl">Present</div></div>
      <div class="card red"><div class="num">${d.absent}</div><div class="lbl">Absent</div></div>
      <div class="card orange"><div class="num">${d.late}</div><div class="lbl">Late</div></div>
      <div class="card"><div class="num">${d.unmarked}</div><div class="lbl">Unmarked</div></div>
    </div>
    <div class="section">
      <h3>📊 Today by Class — ${d.today}</h3>
      <table><thead><tr><th>Class</th><th>Students</th><th>Present</th><th>Absent</th><th>Late</th><th>Rate</th></tr></thead>
      <tbody>${d.byClass.filter(c=>c.total>0).map(c=>{
        const rate=c.total?Math.round((c.present/c.total)*100):0;
        return`<tr><td><b>${c.name}</b></td><td>${c.total}</td>
          <td><span class="badge badge-present">${c.present}</span></td>
          <td><span class="badge badge-absent">${c.absent}</span></td>
          <td><span class="badge badge-late">${c.late}</span></td>
          <td><b style="color:${rate>=75?'#2e7d32':rate>=50?'#e65100':'#c62828'}">${rate}%</b></td></tr>`;
      }).join('')}</tbody></table>
    </div>`;
}

// ── STUDENTS ──────────────────────────────────────────────
let _students=[];
async function loadStudents(){
  _students=await api('/api/admin/students').then(r=>r.json());
  document.getElementById('tab-students').innerHTML=`
    <div class="section section-border">
      <h3>➕ Add New Student</h3>
      <div class="row2">
        <div class="fg"><label>Full Name *</label><input id="s_name" placeholder="Student full name"></div>
        <div class="fg"><label>Admission No. *</label><input id="s_adm" placeholder="e.g. ADM001"></div>
      </div>
      <div class="row2">
        <div class="fg"><label>Class *</label><select id="s_class">${_classes.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
        <div class="fg"><label>Gender</label><select id="s_gender"><option value="">-</option><option>Male</option><option>Female</option></select></div>
      </div>
      <div class="row2">
        <div class="fg"><label>Parent Name</label><input id="s_parent" placeholder="Parent/Guardian"></div>
        <div class="fg"><label>Parent Phone</label><input id="s_pphone" placeholder="Phone number"></div>
      </div>
      <div id="sAddAlert"></div>
      <button class="btn btn-primary" style="width:auto;padding:10px 24px" onclick="addStudent()">➕ Add Student</button>
    </div>
    <div class="section">
      <div class="flex-between" style="margin-bottom:10px">
        <h3>🎓 All Students (${_students.length})</h3>
        <select onchange="filterByClass(this.value)" style="padding:6px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:0.82em">
          <option value="">All Classes</option>
          ${_classes.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
        </select>
      </div>
      <input class="search-bar" placeholder="🔍 Search name, admission number..." oninput="filterStudents(this.value)" id="studentSearch">
      <div id="studentTable"></div>
    </div>`;
  renderStudents(_students);
}

function renderStudents(list){
  if(!list.length){document.getElementById('studentTable').innerHTML='<p style="color:#999;text-align:center;padding:20px">No students found.</p>';return;}
  document.getElementById('studentTable').innerHTML=`
    <table><thead><tr><th>Name</th><th>Adm No</th><th>Class</th><th>Present</th><th>Absent</th><th>Late</th><th>Actions</th></tr></thead>
    <tbody>${list.map(s=>`<tr>
      <td><b>${s.full_name}</b>${s.gender?`<br><small style="color:#999">${s.gender}</small>`:''}</td>
      <td>${s.admission_number}</td><td>${s.class_name}</td>
      <td><span class="badge badge-present">${s.stats?.present||0}</span></td>
      <td><span class="badge badge-absent">${s.stats?.absent||0}</span></td>
      <td><span class="badge badge-late">${s.stats?.late||0}</span></td>
      <td><div class="action-btns">
        <button class="btn-sm btn-blue" onclick="showQR(${s.id},'${s.full_name.replace(/'/g,"\\'")}','${s.admission_number}','${s.class_name}')">QR</button>
        <button class="btn-sm btn-purple" onclick="openEditStudent(${s.id})">Edit</button>
        <button class="btn-sm btn-red" onclick="delStudent(${s.id})">Del</button>
      </div></td></tr>`).join('')}
    </tbody></table>`;
}

function filterStudents(q){
  const sel=document.getElementById('studentSearch');
  renderStudents(_students.filter(s=>
    s.full_name.toLowerCase().includes(q.toLowerCase())||
    s.admission_number.toLowerCase().includes(q.toLowerCase())));
}

function filterByClass(cid){
  renderStudents(cid?_students.filter(s=>s.class_id==cid):_students);
}

async function addStudent(){
  const r=await api('/api/admin/students',{method:'POST',body:JSON.stringify({
    full_name:document.getElementById('s_name').value,
    admission_number:document.getElementById('s_adm').value,
    class_id:document.getElementById('s_class').value,
    gender:document.getElementById('s_gender').value,
    parent_name:document.getElementById('s_parent').value,
    parent_phone:document.getElementById('s_pphone').value
  })});
  const d=await r.json();
  showAlert('sAddAlert',d.error?'error':'success',d.error||d.message);
  if(!d.error){
    ['s_name','s_adm','s_parent','s_pphone'].forEach(id=>document.getElementById(id).value='');
    loadStudents();
  }
}

async function delStudent(id){
  if(!confirm('Delete this student? This cannot be undone.'))return;
  await api('/api/admin/students/'+id,{method:'DELETE'});
  loadStudents();
}

let _editSid=null;
function openEditStudent(id){
  const s=_students.find(x=>x.id==id);if(!s)return;
  _editSid=id;
  document.getElementById('es_name').value=s.full_name;
  document.getElementById('es_class').innerHTML=_classes.map(c=>`<option value="${c.id}"${c.id==s.class_id?' selected':''}>${c.name}</option>`).join('');
  document.getElementById('es_gender').value=s.gender||'';
  document.getElementById('es_dob').value=s.date_of_birth||'';
  document.getElementById('es_parent').value=s.parent_name||'';
  document.getElementById('es_pphone').value=s.parent_phone||'';
  document.getElementById('es_address').value=s.address||'';
  document.getElementById('esAlert').innerHTML='';
  document.getElementById('editStudentModal').classList.add('show');
}

async function saveEditStudent(){
  const r=await api('/api/admin/students/'+_editSid,{method:'PUT',body:JSON.stringify({
    full_name:document.getElementById('es_name').value,
    class_id:document.getElementById('es_class').value,
    gender:document.getElementById('es_gender').value,
    date_of_birth:document.getElementById('es_dob').value,
    parent_name:document.getElementById('es_parent').value,
    parent_phone:document.getElementById('es_pphone').value,
    address:document.getElementById('es_address').value
  })});
  const d=await r.json();
  showAlert('esAlert',d.error?'error':'success',d.error||d.message);

async function addSubject(){
  const name=document.getElementById('sub_name').value.trim();
  const cid=document.getElementById('sub_class').value;
  if(!name){showAlert('subAlert','error','Enter subject name');return;}
  const r=await api('/api/grades/subjects',{method:'POST',body:JSON.stringify({name,class_id:cid})});
  const d=await r.json();
  showAlert('subAlert',d.error?'error':'success',d.error||d.message);
  if(!d.error){document.getElementById('sub_name').value='';loadSubjectList();}
}

async function loadSubjectList(){
  const cid=document.getElementById('sub_class')?.value;
  if(!cid)return;
  const data=await api('/api/grades/subjects?class_id='+cid).then(r=>r.json());
  const el=document.getElementById('subjectList');
  if(!el)return;
  el.innerHTML=`<div class="section"><h3>Subjects (${data.length})</h3>
    ${data.length?`<table><thead><tr><th>Subject</th><th>Action</th></tr></thead>
    <tbody>${data.map(s=>`<tr><td><b>${s.name}</b></td>
      <td><button class="btn-sm btn-red" onclick="delSubject(${s.id})">Delete</button></td></tr>`).join('')}
    </tbody></table>`:'<p style="color:#999">No subjects yet. Add one above.</p>'}
  </div>`;
}

async function delSubject(id){
  if(!confirm('Delete subject and all its grades?'))return;
  await api('/api/grades/subjects/'+id,{method:'DELETE'});
  loadSubjectList();
}

async function loadGradeSubjects(){
  const el=document.getElementById('gr_class');
  const sel=document.getElementById('gr_subject');
  if(!el||!sel)return;
  const data=await api('/api/grades/subjects?class_id='+el.value).then(r=>r.json());
  sel.innerHTML=data.length?data.map(s=>`<option value="${s.id}">${s.name}</option>`).join(''):'<option value="">No subjects for this class</option>';
}

async function fetchGrades(){
  const tid=document.getElementById('gr_term').value;
  const cid=document.getElementById('gr_class').value;
  const sid=document.getElementById('gr_subject').value;
  if(!sid){alert('Select a subject');return;}

async function addTimetable(){
  const r=await api('/api/timetable',{method:'POST',body:JSON.stringify({
    class_id:document.getElementById('tt_class').value,
    day:document.getElementById('tt_day').value,
    period:document.getElementById('tt_period').value,
    subject:document.getElementById('tt_subject').value,
    start_time:document.getElementById('tt_start').value,
    end_time:document.getElementById('tt_end').value,
    teacher_id:document.getElementById('tt_teacher').value||null
  })});
  const d=await r.json();
  showAlert('ttAlert',d.error?'error':'success',d.error||d.message);
  if(!d.error){
    document.getElementById('tt_subject').value='';
    document.getElementById('tt_start').value='';
    document.getElementById('tt_end').value='';
    const p=document.getElementById('tt_period');
    p.value=parseInt(p.value)+1;
    fetchTimetable();
  }
}

async function fetchTimetable(){
  const cid=document.getElementById('tt_class')?.value;
  if(!cid)return;
  const data=await api('/api/timetable?class_id='+cid).then(r=>r.json());
  window._ttData=data;
  const days=['Monday','Tuesday','Wednesday','Thursday','Friday'];
  const byDay={};days.forEach(d=>byDay[d]=[]);
  data.forEach(e=>{if(byDay[e.day])byDay[e.day].push(e);});
  const cname=_classes.find(c=>c.id==cid)?.name||'';
  document.getElementById('ttView').innerHTML=`
    <p style="color:#666;font-size:0.82em;margin-bottom:10px">Class: <b>${cname}</b></p>
    ${days.map(day=>`
      <div style="margin-bottom:12px">
        <div style="color:#4a0080;font-weight:700;font-size:0.88em;margin-bottom:6px;padding:4px 0;border-bottom:1px solid #eee">${day}</div>
        ${byDay[day].length?`<table><thead><tr><th>P</th><th>Subject</th><th>Time</th><th>Teacher</th><th>Del</th></tr></thead>
        <tbody>${byDay[day].map(e=>`<tr>
          <td><b>P${e.period}</b></td><td>${e.subject}</td>
          <td style="white-space:nowrap">${e.start_time||''}${e.end_time?' - '+e.end_time:''}</td>
          <td>${e.teacher_name||'-'}</td>
          <td><button class="btn-sm btn-red" onclick="delTimetable(${e.id})">Del</button></td>
        </tr>`).join('')}</tbody></table>`
        :'<p style="color:#bbb;font-size:0.82em;padding:4px 0">No entries</p>'}
      </div>`).join('')}`;
}

async function delTimetable(id){
  await api('/api/timetable/'+id,{method:'DELETE'});fetchTimetable();
}

function printTimetable(){
  const cid=document.getElementById('tt_class')&&document.getElementById('tt_class').value;
  const cname=(_classes.find(function(c){return c.id==cid;})||{}).name||'All Classes';
  const days=['Monday','Tuesday','Wednesday','Thursday','Friday'];
  const settings_sn='Unto Others International School';
  const allPeriods=[];
  const byDay={};
  days.forEach(function(d){byDay[d]=[];});
  if(window._ttData&&window._ttData.length){
    window._ttData.forEach(function(p){
      if(!allPeriods.includes(p.period_number))allPeriods.push(p.period_number);
      if(byDay[p.day])byDay[p.day].push(p);
    });
    allPeriods.sort(function(a,b){return a-b;});
  }
  let tableHead='<tr><th style="background:#4a0080;color:white;padding:8px 10px;border:1px solid #ccc">Period</th>';
  days.forEach(function(d){tableHead+='<th style="background:#4a0080;color:white;padding:8px 10px;border:1px solid #ccc;min-width:100px">'+d+'</th>';});
  tableHead+='</tr>';
  let tableBody='';
  if(allPeriods.length===0){
    tableBody='<tr><td colspan="6" style="text-align:center;padding:20px;color:#999">No timetable entries found</td></tr>';
  } else {
    allPeriods.forEach(function(pn){
      tableBody+='<tr>';
      tableBody+='<td style="background:#f5f0ff;font-weight:700;padding:8px 10px;border:1px solid #eee;text-align:center">'+pn+'</td>';
      days.forEach(function(d){
        const entry=byDay[d].find(function(e){return e.period_number==pn;});
        if(entry){
          tableBody+='<td style="padding:8px 10px;border:1px solid #eee;vertical-align:top">'
            +'<div style="font-weight:600;font-size:0.88em;color:#1a237e">'+entry.subject+'</div>'
            +'<div style="font-size:0.75em;color:#555">'+entry.start_time+' - '+entry.end_time+'</div>'
            +(entry.teacher_name?'<div style="font-size:0.72em;color:#4a0080">'+entry.teacher_name+'</div>':'')
            +'</td>';
        } else {
          tableBody+='<td style="padding:8px 10px;border:1px solid #eee;color:#ccc;text-align:center;font-size:0.8em">—</td>';
        }
      });
      tableBody+='</tr>';
    });
  }
  const w=window.open('','_blank','width=900,height=700');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Timetable</title><style>'
  +'*{margin:0;padding:0;box-sizing:border-box}'
  +'body{font-family:Arial,sans-serif;padding:28px;color:#111;background:#fff}'
  +'.hdr{text-align:center;border-bottom:3px double #4a0080;padding-bottom:14px;margin-bottom:20px}'
  +'.logo{width:65px;height:65px;border-radius:50%;border:3px solid #f5c800;object-fit:cover}'
  +'.sn{font-size:1.2em;font-weight:700;color:#4a0080;margin:6px 0 2px;text-transform:uppercase;letter-spacing:1px}'
  +'.sm{font-size:0.78em;color:#666;font-style:italic}'
  +'.doctitle{font-size:1em;font-weight:700;background:#4a0080;color:white;display:inline-block;padding:3px 20px;border-radius:3px;margin-top:8px;letter-spacing:2px;text-transform:uppercase}'
  +'.meta{display:flex;justify-content:space-between;font-size:0.82em;color:#555;margin-bottom:16px;padding:6px 10px;background:#f5f0ff;border-radius:5px;border:1px solid #d0bfff}'
  +'table{width:100%;border-collapse:collapse;font-size:0.85em}'
  +'.sig{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-top:32px;font-size:0.8em}'
  +'.sline{border-top:1px solid #555;padding-top:4px;margin-top:28px;text-align:center;color:#555}'
  +'.pbtn{display:block;margin:20px auto 0;padding:10px 32px;background:#4a0080;color:white;border:none;border-radius:6px;font-size:0.95em;cursor:pointer;letter-spacing:1px}'
  +'@media print{.pbtn{display:none} body{padding:10px}}'
  +'</style></head><body>'
  +'<div class="hdr">'
  +'<img src="/images/logo.jpeg" class="logo" onerror="this.style.display='none'">'
  +'<div class="sn">'+settings_sn+'</div>'
  +'<div class="sm">Faith and Righteousness</div>'
  +'<div class="doctitle">Class Timetable</div>'
  +'</div>'
  +'<div class="meta"><span><b>Class:</b> '+cname+'</span><span><b>Academic Year:</b> '+new Date().getFullYear()+'/'+(new Date().getFullYear()+1)+'</span><span><b>Printed:</b> '+new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'})+'</span></div>'
  +'<table><thead>'+tableHead+'</thead><tbody>'+tableBody+'</tbody></table>'
  +'<div class="sig">'
  +'<div><div class="sline">Class Teacher</div></div>'
  +'<div><div class="sline">Head Teacher / Principal</div></div>'
  +'<div><div class="sline">Date</div></div>'
  +'</div>'
  +'<button class="pbtn" onclick="window.print()">Print Timetable</button>'
  +'</body></html>');
  w.document.close();
}

async function showProgressReport() {
  const sid = document.getElementById('pr_student').value;
  if (!sid) return alert('Please select a student');
  const data = await api('/api/grades/progress/' + sid).then(r => r.json());
  if (data.error) return alert(data.error);
  const { student, progressData } = data;
  if (!progressData.length) {
    document.getElementById('progressReportView').innerHTML = '<p style="color:#c00;margin-top:12px">No grade data found for this student.</p>';
    return;
  }
  const allSubjects = [...new Set(progressData.flatMap(t => t.grades.map(g => g.subject_name)))];
  const colors = ['#1a237e','#2e7d32','#b71c1c','#e65100','#4a148c','#006064','#37474f'];
  let html = '<div style="margin-top:20px">';
  html += '<h4 style="color:#1a237e;margin-bottom:12px">&#128200; ' + student.full_name + ' — Progress Report (' + student.class_name + ')</h4>';
  // Summary table
  html += '<table style="width:100%;border-collapse:collapse;font-size:0.82em;margin-bottom:18px">';
  html += '<thead><tr style="background:#1a237e;color:#fff"><th style="padding:6px 8px;text-align:left">Subject</th>';
  progressData.forEach(t => { html += '<th style="padding:6px 8px;text-align:center">' + t.term + '</th>'; });
  html += '<th style="padding:6px 8px;text-align:center">Trend</th></tr></thead><tbody>';
  allSubjects.forEach((sub, si) => {
    const scores = progressData.map(t => { const g = t.grades.find(x => x.subject_name === sub); return g ? g.total : null; });
    const valid = scores.filter(s => s !== null);
    const trend = valid.length >= 2 ? (valid[valid.length-1] - valid[0] >= 0 ? '&#8679; +' + (valid[valid.length-1]-valid[0]).toFixed(1) : '&#8681; ' + (valid[valid.length-1]-valid[0]).toFixed(1)) : '—';
    const trendColor = valid.length >= 2 ? (valid[valid.length-1] >= valid[0] ? '#2e7d32' : '#c00') : '#555';
    html += '<tr style="background:' + (si%2===0?'#f5f5f5':'#fff') + '">';
    html += '<td style="padding:6px 8px;font-weight:600">' + sub + '</td>';
    scores.forEach(s => { html += '<td style="padding:6px 8px;text-align:center">' + (s !== null ? s : '—') + '</td>'; });
    html += '<td style="padding:6px 8px;text-align:center;font-weight:700;color:' + trendColor + '">' + trend + '</td>';
    html += '</tr>';
  });
  // Average row
  html += '<tr style="background:#1a237e;color:#fff;font-weight:700"><td style="padding:6px 8px">Overall Average</td>';
  progressData.forEach(t => { html += '<td style="padding:6px 8px;text-align:center">' + t.average + '</td>'; });
  html += '<td></td></tr>';
  html += '</tbody></table>';
  // Bar chart using CSS
  html += '<h5 style="color:#1a237e;margin-bottom:8px">Average Score Per Term</h5>';
  html += '<div style="display:flex;align-items:flex-end;gap:16px;height:120px;padding:8px;background:#f5f5f5;border-radius:8px;margin-bottom:16px">';
  progressData.forEach((t, i) => {
    const h = Math.round((t.average / 100) * 100);
    html += '<div style="display:flex;flex-direction:column;align-items:center;flex:1">';
    html += '<span style="font-size:0.78em;font-weight:700;color:#1a237e;margin-bottom:4px">' + t.average + '</span>';
    html += '<div style="width:100%;height:' + h + 'px;background:' + (colors[i]||'#1a237e') + ';border-radius:4px 4px 0 0"></div>';
    html += '<span style="font-size:0.72em;margin-top:4px;text-align:center;color:#333">' + t.term + '</span>';
    html += '</div>';
  });
  html += '</div>';
  html += '<button class="btn" style="background:#1a237e;color:#fff;padding:8px 18px;margin-top:4px" onclick="printProgressReport()">&#128424; Print Progress Report</button>';
  html += '</div>';
  document.getElementById('progressReportView').innerHTML = html;
  window._progressData = { student, progressData };
}

function printProgressReport() {
  if (!window._progressData) return;
  const { student, progressData } = window._progressData;
  const allSubjects = [...new Set(progressData.flatMap(t => t.grades.map(g => g.subject_name)))];
  const w = window.open('','_blank','width=900,height=700');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Progress Report</title><style>');
  w.document.write('*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;padding:24px;background:#fff}');
  w.document.write('.hdr{text-align:center;border-bottom:3px double #1a237e;padding-bottom:14px;margin-bottom:18px}');
  w.document.write('.logo{width:65px;height:65px;border-radius:50%;object-fit:cover;border:3px solid #1a237e}');
  w.document.write('h1{font-size:1.1em;color:#1a237e;margin-top:4px}h2{font-size:0.95em;color:#555;font-weight:400}');
  w.document.write('table{width:100%;border-collapse:collapse;font-size:0.85em;margin-top:14px}');
  w.document.write('th{background:#1a237e;color:#fff;padding:7px 10px;text-align:center}td{padding:7px 10px;border:1px solid #ddd;text-align:center}');
  w.document.write('td:first-child{text-align:left;font-weight:600}.avg{background:#1a237e;color:#fff;font-weight:700}');
  w.document.write('.up{color:#2e7d32;font-weight:700}.dn{color:#c00;font-weight:700}');
  w.document.write('@media print{button{display:none}body{padding:12px}}');
  w.document.write('</style></head><body>');
  w.document.write('<div class="hdr"><img src="/images/logo.jpeg" class="logo" onerror="this.style.display='none'">');
  w.document.write('<h1>Unto Others International School</h1><h2>Faith and Righteousness</h2>');
  w.document.write('<div style="margin-top:6px;font-size:0.9em"><b>Student Progress Report</b></div></div>');
  w.document.write('<p style="margin-bottom:10px"><b>Name:</b> ' + student.full_name + ' &nbsp; <b>Class:</b> ' + student.class_name + ' &nbsp; <b>Admission No:</b> ' + (student.admission_number||'—') + '</p>');
  w.document.write('<table><thead><tr><th style="text-align:left">Subject</th>');
  progressData.forEach(t => { w.document.write('<th>' + t.term + '</th>'); });
  w.document.write('<th>Trend</th></tr></thead><tbody>');
  allSubjects.forEach(sub => {
    const scores = progressData.map(t => { const g = t.grades.find(x => x.subject_name === sub); return g ? g.total : null; });
    const valid = scores.filter(s => s !== null);
    const trendVal = valid.length >= 2 ? (valid[valid.length-1] - valid[0]) : null;
    const trendStr = trendVal !== null ? (trendVal >= 0 ? '+'+trendVal.toFixed(1) : trendVal.toFixed(1)) : '—';
    const trendClass = trendVal !== null ? (trendVal >= 0 ? 'up' : 'dn') : '';
    w.document.write('<tr><td>' + sub + '</td>');
    scores.forEach(s => { w.document.write('<td>' + (s !== null ? s : '—') + '</td>'); });
    w.document.write('<td class="' + trendClass + '">' + trendStr + '</td></tr>');
  });
  w.document.write('<tr class="avg"><td>Overall Average</td>');
  progressData.forEach(t => { w.document.write('<td>' + t.average + '</td>'); });
  w.document.write('<td></td></tr></tbody></table>');
  w.document.write('<div style="margin-top:18px;text-align:center"><button onclick="window.print()" style="padding:8px 24px;background:#1a237e;color:#fff;border:none;border-radius:4px;cursor:pointer">Print</button></div>');
  w.document.write('</body></html>');
  w.document.close();
}

  window._idCardsClass=cname;
  window._idCardsCount=students.length;
}

function printIDCards(){
  const cards=window._idCardsHTML||'';
  const cname=window._idCardsClass||'';
  const count=window._idCardsCount||0;
  const w=window.open('','_blank','width=900,height=700');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Student ID Cards</title><style>'
  +'*{margin:0;padding:0;box-sizing:border-box}'
  +'body{font-family:Arial,sans-serif;background:#fff;padding:20px}'
  +'.hdr{text-align:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #4a0080}'
  +'.sn{font-size:1.1em;font-weight:700;color:#4a0080;text-transform:uppercase;letter-spacing:1px}'
  +'.meta{font-size:0.82em;color:#555;margin-top:4px}'
  +'.grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-start}'
  +'.pbtn{display:block;margin:16px auto 0;padding:10px 32px;background:#4a0080;color:white;border:none;border-radius:6px;font-size:0.95em;cursor:pointer;letter-spacing:1px}'
  +'@media print{'
  +'.pbtn{display:none}'
  +'.hdr{display:none}'
  +'body{padding:5mm}'
  +'}'
  +'</style></head><body>'
  +'<div class="hdr">'
  +'<div class="sn">Unto Others International School</div>'
  +'<div class="meta">Student ID Cards &mdash; Class: '+cname+' &mdash; '+count+' cards &mdash; Printed: '+new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'})+'</div>'
  +'</div>'
  +'<div class="grid">'+cards+'</div>'
  +'<button class="pbtn" onclick="window.print()">Print All ID Cards</button>'
  +'</body></html>');
  w.document.close();
}

function exportCSV(){
  const from=document.getElementById('exp_from').value;
  const to=document.getElementById('exp_to').value;
  const cls=document.getElementById('exp_class').value;
  let url='/api/admin/attendance/export?token='+token;
  if(from)url+='&from='+from;
  if(to)url+='&to='+to;
  if(cls)url+='&class_id='+cls;
  window.open(url,'_blank');
}

// ── NOTICES ───────────────────────────────────────────────
async function loadNotices(){
  const notices=await api('/api/admin/notices').then(r=>r.json());
  document.getElementById('tab-notices').innerHTML=`
    <div class="section section-border">
      <h3>📢 Post New Notice</h3>
      <div class="fg"><label>Title</label><input id="not_title" placeholder="Notice title"></div>
      <div class="fg"><label>Message</label><textarea id="not_body" placeholder="Notice message..."></textarea></div>
      <div class="fg"><label>Target</label><select id="not_target"><option value="all">Everyone</option><option value="teachers">Teachers Only</option></select></div>
      <div id="notAlert"></div>
      <button class="btn btn-primary" style="width:auto;padding:10px 20px" onclick="postNotice()">Post Notice</button>
    </div>
    <div class="section">
      <h3>📋 All Notices (${notices.length})</h3>
      ${notices.length?notices.map(n=>`
        <div style="background:#f8f5ff;border-left:4px solid #4a0080;border-radius:8px;padding:12px;margin-bottom:10px">
          <div class="flex-between">
            <div><b>${n.title}</b> <span class="tag">${n.target}</span></div>
            <button class="btn-sm btn-red" onclick="delNotice(${n.id})">Del</button>
          </div>
          <p style="color:#555;font-size:0.85em;margin-top:6px">${n.body}</p>
          <small style="color:#999">${new Date(n.created_at).toLocaleDateString()}</small>
        </div>`).join('')
      :'<p style="color:#999">No notices yet.</p>'}
    </div>`;
}

async function postNotice(){
  const r=await api('/api/admin/notices',{method:'POST',body:JSON.stringify({title:document.getElementById('not_title').value,body:document.getElementById('not_body').value,target:document.getElementById('not_target').value})});
  const d=await r.json();
  showAlert('notAlert',d.error?'error':'success',d.error||d.message);
  if(!d.error){document.getElementById('not_title').value='';document.getElementById('not_body').value='';loadNotices();}
}

async function delNotice(id){
  if(!confirm('Delete notice?'))return;
  await api('/api/admin/notices/'+id,{method:'DELETE'});loadNotices();
}

// ── TERMS ─────────────────────────────────────────────────
async function loadTerms(){
  const [terms,current]=await Promise.all([api('/api/admin/terms').then(r=>r.json()),api('/api/admin/current-term').then(r=>r.json())]);
  document.getElementById('tab-terms').innerHTML=`
    <div style="background:white;border:2px solid #4a0080;border-radius:12px;padding:20px;margin-bottom:14px;text-align:center">
      <div style="font-size:1.4em;font-weight:700;color:#4a0080">📅 ${current?.name||'No Term'}</div>
      <div style="color:#888;font-size:0.85em;margin-top:4px">Current Term</div>
    </div>
    <div class="section section-border">
      <h3>🆕 Start New Term</h3>
      <p style="color:#888;font-size:0.82em;margin-bottom:12px">⚠️ This will delete ALL attendance records. Export reports first.</p>
      <div class="fg"><label>Term Name</label><input id="nt_name" placeholder="e.g. Second Term 2025/2026"></div>
      <div class="row2">
        <div class="fg"><label>Start Date</label><input type="date" id="nt_start"></div>
        <div class="fg"><label>End Date</label><input type="date" id="nt_end"></div>
      </div>
      <div id="termAlert"></div>
      <button class="btn btn-primary" style="background:linear-gradient(135deg,#e53935,#b71c1c);width:auto;padding:10px 20px" onclick="startNewTerm()">🔄 Start New Term</button>
    </div>
    <div class="section"><h3>📜 Term History</h3>
      ${terms.map((t,i)=>`<div style="background:#f8f9ff;border-radius:8px;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
        <div><b>${t.name}</b><br><small style="color:#999">${t.start_date||''} ${t.end_date?'→ '+t.end_date:''}</small></div>
        ${t.is_current?'<span class="badge badge-present">Current</span>':'<span class="badge" style="background:#f5f5f5;color:#999">Past</span>'}
      </div>`).join('')}
    </div>`;
}

async function startNewTerm(){
  const name=document.getElementById('nt_name').value.trim();
  if(!name){showAlert('termAlert','error','Enter term name');return;}
  if(!confirm(`Start "${name}"?\n\nALL attendance records will be DELETED.\nExport your reports first!`))return;
  if(!confirm('Are you 100% sure? This cannot be undone.'))return;
  const r=await api('/api/admin/terms',{method:'POST',body:JSON.stringify({name,start_date:document.getElementById('nt_start').value,end_date:document.getElementById('nt_end').value,confirmed:true})});
  const d=await r.json();
  showAlert('termAlert',d.error?'error':'success',d.error||d.message);
  if(!d.error){init();setTimeout(loadTerms,800);}
}

// ── SETTINGS ──────────────────────────────────────────────
async function loadSettings(){
  const d=await api('/api/admin/settings').then(r=>r.json());
  document.getElementById('tab-settings').innerHTML=`
    <div class="section section-border">
      <h3>🏫 School Information</h3>
      <div class="fg"><label>School Name</label><input id="set_name" value="${d.school_name||''}"></div>
      <div class="fg"><label>Motto</label><input id="set_motto" value="${d.school_motto||''}"></div>
      <div class="row2">
        <div class="fg"><label>Phone</label><input id="set_phone" value="${d.school_phone||''}"></div>
        <div class="fg"><label>Email</label><input id="set_email" value="${d.school_email||''}"></div>
      </div>
      <div class="fg"><label>Address</label><input id="set_address" value="${d.school_address||''}"></div>
      <div class="fg"><label>Currency Symbol</label><input id="set_currency" value="${d.currency_symbol||'GH₵'}"></div>
      <div id="setAlert"></div>
      <button class="btn btn-primary" style="width:auto;padding:10px 20px" onclick="saveSettings()">💾 Save Settings</button>
    </div>
    <div class="section" style="border:2px solid #1a237e">
      <h3>⏰ Auto-Absent Settings</h3>
      <div class="fg"><label>Auto-Absent Time (24h)</label><input type="time" id="set_time" value="${d.auto_absent_time||'15:00'}"></div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <input type="checkbox" id="set_enabled" ${d.auto_absent_enabled?'checked':''} style="width:18px;height:18px;cursor:pointer">
        <label for="set_enabled" style="cursor:pointer;font-weight:600">Enable auto-absent at set time</label>
      </div>
      <button class="btn btn-orange btn-sm" style="padding:10px 20px" onclick="triggerAutoAbsent()">Mark All Unmarked Absent Now</button>
      <div id="triggerResult" style="margin-top:10px"></div>
    </div>
    <div class="section" style="border:2px solid #4a0080">
      <h3>🔐 Change Admin Password</h3>
      <div class="fg"><label>Current Password</label><input type="password" id="ap_old" placeholder="Current password"></div>
      <div class="fg"><label>New Password (min 6)</label><input type="password" id="ap_new" placeholder="New password"></div>
      <div class="fg"><label>Confirm</label><input type="password" id="ap_conf" placeholder="Confirm new password"></div>
      <div id="apAlert"></div>
      <button class="btn btn-primary" style="width:auto;padding:10px 20px" onclick="changeAdminPw()">Change Password</button>
    </div>`;
}

async function saveSettings(){
  const r=await api('/api/admin/settings',{method:'PUT',body:JSON.stringify({
    school_name:document.getElementById('set_name').value,
    school_motto:document.getElementById('set_motto').value,
    school_phone:document.getElementById('set_phone').value,
    school_email:document.getElementById('set_email').value,
    school_address:document.getElementById('set_address').value,
    currency_symbol:document.getElementById('set_currency').value,
    auto_absent_time:document.getElementById('set_time').value,
    auto_absent_enabled:document.getElementById('set_enabled').checked
  })});
  const d=await r.json();
  showAlert('setAlert',d.error?'error':'success',d.error||d.message);
  if(!d.error){_currency=document.getElementById('set_currency').value;}
}

async function triggerAutoAbsent(){
  if(!confirm('Mark ALL unmarked students absent today?'))return;
  const d=await api('/api/admin/auto-absent',{method:'POST'}).then(r=>r.json());
  document.getElementById('triggerResult').innerHTML=`<div class="alert alert-success">✅ ${d.message}</div>`;
}

async function changeAdminPw(){
  const op=document.getElementById('ap_old').value;
  const np=document.getElementById('ap_new').value;
  const cp=document.getElementById('ap_conf').value;
  if(!op||!np||!cp){showAlert('apAlert','error','All fields required');return;}
  if(np!==cp){showAlert('apAlert','error','Passwords do not match');return;}
  if(np.length<6){showAlert('apAlert','error','Min 6 characters');return;}
  const r=await api('/api/auth/admin/change-password',{method:'POST',body:JSON.stringify({oldPassword:op,newPassword:np})});
  const d=await r.json();
  showAlert('apAlert',d.error?'error':'success',d.error||d.message);
  if(!d.error)setTimeout(()=>{localStorage.clear();location.reload();},2000);
}
</script>
</body>
</html>
